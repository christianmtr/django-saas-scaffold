# copier.yml
_min_copier_version: "9.0"

# Delimitadores personalizados para no conflictuar con Django templates
# NOTA: Al usar estos, las lógicas de control dentro de este archivo 
# deben usar estos nuevos delimitadores.
_envops:
  block_start_string: "[%"
  block_end_string: "%]"
  variable_start_string: "[["
  variable_end_string: "]]"
  comment_start_string: "[#"
  comment_end_string: "#]"

_subdirectory: "template"

# ---------------------------------------------------------------------------
# Preguntas — datos del proyecto
# ---------------------------------------------------------------------------

project_name:
  type: str
  help: "Nombre del proyecto (ej: RestaurantHub, GastroCore)"
  # Eliminamos @value y usamos la variable directamente con los nuevos tags
  validator: >-
    [% if not (project_name | regex_search('^[A-Za-z][A-Za-z0-9 _-]+$')) %]
    Solo letras, números, espacios, guiones y guiones bajos. Debe empezar con letra.
    [% endif %]

project_slug:
  type: str
  help: "Slug del proyecto — nombre del schema PostgreSQL y carpeta del módulo Django"
  default: "[[ project_name | lower | replace(' ', '_') | replace('-', '_') ]]"
  validator: >-
    [% if not (project_slug | regex_search('^[a-z][a-z0-9_]+$')) %]
    Solo minúsculas, números y guiones bajos. Debe empezar con letra.
    [% endif %]

project_description:
  type: str
  help: "Descripción corta del proyecto"
  default: "SaaS multi-tenant con Django"

author_name:
  type: str
  help: "Tu nombre o el de tu empresa"

author_email:
  type: str
  help: "Email de contacto"
  validator: >-
    [% if not (author_email | regex_search('^[^@]+@[^@]+\\.[^@]+$')) %]
    Ingresa un email válido.
    [% endif %]

github_username:
  type: str
  help: "Tu usuario de GitHub"
  default: ""

timezone:
  type: str
  help: "Timezone del servidor"
  default: "America/Lima"
  choices:
    - "America/Lima"
    - "America/Bogota"
    - "America/Santiago"
    - "America/Mexico_City"
    - "America/Argentina/Buenos_Aires"
    - "America/Sao_Paulo"
    - "UTC"

base_domain:
  type: str
  help: "Dominio base (ej: miapp.pe)"
  default: "localhost"

version:
  type: str
  help: "Versión inicial"
  default: "0.1.0"

python_version:
  type: str
  help: "Versión de Python"
  default: "3.12"
  choices:
    - "3.12"
    - "3.13"

use_celery:
  type: bool
  help: "¿Incluir Celery + Redis?"
  default: false

use_frontend:
  type: bool
  help: "¿Incluir frontend React 19 + Vite + TypeScript?"
  default: true

# ---------------------------------------------------------------------------
# Tareas post-generación
# ---------------------------------------------------------------------------

_tasks:
  - "echo ''"
  - "echo '✅  Proyecto [[project_name]] generado correctamente.'"
  - "echo ''"
  - "echo '📋 Próximos pasos:'"
  - "echo '    1. cd [[project_slug]]'"
  - "echo '    2. cp backend/.env.example backend/.env'"
  - "echo '    3. Edita backend/.env con tus credenciales'"

_message_after_copy: |
  ╔════════════════════════════════════════════════════════╗
  ║  [[ project_name ]] — listo para desarrollar           ║
  ╚════════════════════════════════════════════════════════╝

  Opcionales elegidos:
    Celery + Redis                        [[ '✅' if use_celery else '—' ]]
    Frontend React + Vite + TypeScript    [[ '✅' if use_frontend else '—' ]]

_exclude:
  - copier.yml
  - .git
  - "*.pyc"
  - __pycache__
